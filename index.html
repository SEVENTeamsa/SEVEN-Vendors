<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Vendor Directory</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07090e;--s1:#0d1117;--s2:#131920;--s3:#1a2230;
  --b1:#1e2d42;--b2:#263548;
  --acc:#2563eb;--acc2:#3b82f6;--acc3:#93c5fd;
  --t1:#e2e8f0;--t2:#8899aa;--t3:#4a5568;
  --font:'Inter',sans-serif;--mono:'IBM Plex Mono',monospace;
  --r:8px;--r2:6px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t1);font-family:var(--font);min-height:100vh;font-size:13px}
a{text-decoration:none}

/* TOPBAR */
.topbar{
  height:52px;background:var(--s1);border-bottom:1px solid var(--b1);
  display:flex;align-items:center;padding:0 32px;gap:16px;
  position:sticky;top:0;z-index:100
}
.tb-title{font-size:14px;font-weight:600;color:var(--t1)}
.tb-sub{font-size:11px;color:var(--t3)}
.tb-spacer{flex:1}
.tb-count{font-size:11px;color:var(--t3);font-family:var(--mono)}
.add-btn{
  display:flex;align-items:center;gap:6px;
  background:var(--acc);border:none;color:#fff;
  padding:6px 14px;border-radius:var(--r2);font-size:12px;
  font-weight:500;cursor:pointer;font-family:var(--font);transition:all .15s
}
.add-btn:hover{background:var(--acc2)}

/* FILTERS */
.filters{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:12px 32px;background:var(--s1);border-bottom:1px solid var(--b1)
}
.srch{position:relative;flex:1;min-width:220px;max-width:320px}
.srch input{
  width:100%;background:var(--s2);border:1px solid var(--b1);
  color:var(--t1);padding:7px 11px 7px 32px;border-radius:var(--r2);
  font-size:12px;outline:none;font-family:var(--font);transition:border .15s
}
.srch input:focus{border-color:var(--acc2)}
.srch input::placeholder{color:var(--t3)}
.srch svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--t3)}
.fsel{
  background:var(--s2);border:1px solid var(--b1);color:var(--t1);
  padding:7px 10px;border-radius:var(--r2);font-size:12px;
  outline:none;cursor:pointer;font-family:var(--font)
}
.fsel option{background:#0d1117}
.fsel:focus{border-color:var(--acc2)}
.rct{font-size:11px;color:var(--t3);font-family:var(--mono);margin-left:auto}

/* CATEGORY TABS */
.cat-row{
  display:flex;align-items:center;gap:4px;flex-wrap:wrap;
  padding:10px 32px;border-bottom:1px solid var(--b1);background:var(--s1)
}
.cat-btn{
  display:flex;align-items:center;gap:5px;
  padding:5px 12px;border-radius:var(--r2);border:1px solid var(--b1);
  background:transparent;color:var(--t2);font-size:11px;font-weight:500;
  cursor:pointer;transition:all .15s;font-family:var(--font)
}
.cat-btn:hover{border-color:var(--b2);color:var(--t1)}
.cat-btn.active{border-color:var(--acc2);background:rgba(37,99,235,.1);color:var(--acc3)}
.cat-btn .cc{
  font-size:10px;font-family:var(--mono);
  background:var(--s3);padding:1px 6px;border-radius:8px;color:var(--t3)
}
.cat-btn.active .cc{background:rgba(37,99,235,.2);color:var(--acc3)}

/* SUB TABS */
.sub-row{
  display:flex;align-items:center;gap:4px;flex-wrap:wrap;
  padding:8px 32px;border-bottom:1px solid var(--b1);
  background:var(--bg);min-height:40px
}
.sub-btn{
  padding:4px 11px;border-radius:20px;border:1px solid var(--b1);
  background:transparent;color:var(--t3);font-size:11px;
  cursor:pointer;transition:all .12s;font-family:var(--font)
}
.sub-btn:hover{border-color:var(--b2);color:var(--t2)}
.sub-btn.active{border-color:var(--acc2);background:rgba(37,99,235,.07);color:var(--acc3)}

/* TABLE */
.tbl-wrap{padding:16px 32px}
.tbl-inner{border:1px solid var(--b1);border-radius:var(--r);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{
  padding:8px 12px;text-align:left;font-size:10px;font-weight:600;
  color:var(--t3);text-transform:uppercase;letter-spacing:.5px;
  background:var(--s1);border-bottom:1px solid var(--b1);white-space:nowrap
}
tbody tr{border-bottom:1px solid rgba(30,45,66,.6);transition:background .1s;cursor:default}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(37,99,235,.03)}
td{padding:9px 12px;vertical-align:middle;color:var(--t2)}
.vno{font-family:var(--mono);font-size:10.5px;color:var(--t3)}
.vnm{font-weight:500;color:var(--t1);font-size:12.5px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap}
.eml{color:var(--acc3);font-size:11.5px}
.eml:hover{text-decoration:underline}
.phn{font-family:var(--mono);font-size:11px}
.spec{font-size:11px;color:var(--t3)}

/* EMPTY */
.empty{text-align:center;padding:50px;color:var(--t3)}
.empty-i{font-size:28px;margin-bottom:8px;opacity:.3}

/* PAGER */
.pager{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 32px 32px
}
.pgbtn{
  background:var(--s1);border:1px solid var(--b2);color:var(--t2);
  padding:5px 14px;border-radius:var(--r2);font-size:11px;
  cursor:pointer;font-family:var(--font);transition:all .12s
}
.pgbtn:hover:not(:disabled){border-color:var(--acc2);color:var(--acc3)}
.pgbtn:disabled{opacity:.3;cursor:not-allowed}
.pgi{font-size:11px;color:var(--t3);font-family:var(--mono)}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.mo.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:12px;width:480px;max-width:100%;animation:su .2s ease}
@keyframes su{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.mhdr{padding:14px 18px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center;background:var(--s2);border-radius:12px 12px 0 0}
.mhdr h3{font-size:14px;font-weight:600}
.mcl{background:var(--s3);border:none;color:var(--t2);width:24px;height:24px;border-radius:5px;font-size:13px;cursor:pointer;display:grid;place-items:center}
.mcl:hover{background:var(--b2);color:var(--t1)}
.mbody{padding:18px;display:flex;flex-direction:column;gap:12px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg1{display:flex;flex-direction:column;gap:4px}
.fg1.full{grid-column:1/-1}
.flbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.4px}
.fi,.fs{background:var(--s2);border:1px solid var(--b2);color:var(--t1);padding:8px 10px;border-radius:var(--r2);font-size:12px;outline:none;font-family:var(--font);transition:border .15s}
.fi:focus,.fs:focus{border-color:var(--acc2)}
.fi::placeholder{color:var(--t3)}
.fs option{background:#0d1117}
.mftr{padding:12px 18px;border-top:1px solid var(--b1);display:flex;justify-content:flex-end;gap:8px;background:var(--s2);border-radius:0 0 12px 12px}
.bcan{background:var(--s3);border:1px solid var(--b2);color:var(--t2);padding:6px 14px;border-radius:var(--r2);font-size:12px;cursor:pointer;font-family:var(--font)}
.bsav{background:var(--acc);border:none;color:#fff;padding:6px 18px;border-radius:var(--r2);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font)}
.bsav:hover{background:var(--acc2)}

/* TOAST */
.toast{position:fixed;bottom:18px;right:18px;z-index:9999;background:var(--s1);border:1px solid var(--b2);border-left:3px solid #10b981;padding:10px 14px;border-radius:var(--r);font-size:12px;color:var(--t1);box-shadow:0 6px 24px rgba(0,0,0,.5);display:none}
.toast.err{border-left-color:#ef4444}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:50px;gap:10px;color:var(--t3);font-size:12px}
.spinner{width:18px;height:18px;border:2px solid var(--b2);border-top-color:var(--acc2);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){
  .topbar,.filters,.cat-row,.sub-row,.tbl-wrap,.pager{padding-left:16px;padding-right:16px}
  .fg{grid-template-columns:1fr}
  .fg1.full{grid-column:1}
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div>
    <div class="tb-title">Vendor Directory</div>
    <div class="tb-sub">Approved Supplier Database</div>
  </div>
  <div class="tb-spacer"></div>
  <span class="tb-count" id="totalCount">Loading…</span>
  <button class="add-btn" onclick="openAddVendor()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    Add Vendor
  </button>
</header>

<!-- FILTERS -->
<div class="filters">
  <div class="srch">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="vSrch" placeholder="Search name, email, vendor number…" oninput="onSearch()"/>
  </div>
  <select class="fsel" id="vSubCat" onchange="onFilter()">
    <option value="">All Sub-categories</option>
  </select>
  <span class="rct" id="vCt">—</span>
</div>

<!-- CATEGORY TABS -->
<div class="cat-row">
  <button class="cat-btn active" data-cat="all" onclick="setMainCat('all',this)">All <span class="cc" id="cnt-all">—</span></button>
  <button class="cat-btn" data-cat="IT" onclick="setMainCat('IT',this)">💻 IT <span class="cc" id="cnt-it">—</span></button>
  <button class="cat-btn" data-cat="Marketing" onclick="setMainCat('Marketing',this)">📣 Marketing <span class="cc" id="cnt-mkt">—</span></button>
  <button class="cat-btn" data-cat="Services" onclick="setMainCat('Services',this)">⚙️ Services <span class="cc" id="cnt-svc">—</span></button>
  <button class="cat-btn" data-cat="Consultation & Engineering" onclick="setMainCat('Consultation & Engineering',this)">🏗️ Consultation & Eng. <span class="cc" id="cnt-con">—</span></button>
</div>

<!-- SUB TABS -->
<div class="sub-row" id="subRow"></div>

<!-- TABLE -->
<div class="tbl-wrap">
  <div class="tbl-inner">
    <table>
      <thead>
        <tr>
          <th>Vendor No.</th>
          <th>Name</th>
          <th>Sub-category</th>
          <th>Specialty</th>
          <th>Email</th>
          <th>Phone</th>
        </tr>
      </thead>
      <tbody id="vBody">
        <tr><td colspan="6"><div class="loading"><div class="spinner"></div>Loading vendors…</div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- PAGER -->
<div class="pager" id="vPager"></div>

<!-- ADD VENDOR MODAL -->
<div class="mo" id="addMo">
  <div class="modal">
    <div class="mhdr"><h3>Add New Vendor</h3><button class="mcl" onclick="closeAddVendor()">✕</button></div>
    <div class="mbody">
      <div class="fg">
        <div class="fg1 full"><label class="flbl">Vendor Name *</label><input class="fi" id="nv-name" placeholder="Company name"/></div>
        <div class="fg1"><label class="flbl">Vendor Number</label><input class="fi" id="nv-no" placeholder="e.g. 21000001"/></div>
        <div class="fg1"><label class="flbl">Category *</label>
          <select class="fs" id="nv-cat" onchange="updateAddSubCat()">
            <option value="">— Select —</option>
            <option>IT</option>
            <option>Marketing</option>
            <option>Services</option>
            <option>Consultation & Engineering</option>
          </select>
        </div>
        <div class="fg1"><label class="flbl">Sub-category</label>
          <select class="fs" id="nv-sub"><option value="">— Select category first —</option></select>
        </div>
        <div class="fg1"><label class="flbl">Specialty</label><input class="fi" id="nv-spec" placeholder="e.g. Digital Marketing"/></div>
        <div class="fg1"><label class="flbl">Vendor Type</label>
          <select class="fs" id="nv-type"><option>Local</option><option>Overseas</option></select>
        </div>
        <div class="fg1"><label class="flbl">Email</label><input class="fi" id="nv-email" type="email" placeholder="contact@vendor.com"/></div>
        <div class="fg1"><label class="flbl">Phone</label><input class="fi" id="nv-phone" placeholder="+966 5x xxx xxxx"/></div>
      </div>
    </div>
    <div class="mftr">
      <button class="bcan" onclick="closeAddVendor()">Cancel</button>
      <button class="bsav" onclick="saveVendor()">Save Vendor</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = supabase.createClient(
  'https://mucgimjdtegxcycpsnwb.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11Y2dpbWpkdGVneGN5Y3BzbndiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MzA5MDIsImV4cCI6MjA5MTIwNjkwMn0.sRGMzXluEdwcdDSjnue9SJ2PIuxbmTdI8BIPh0UU3NY'
);

let ALL=[], filtered=[], mainCat='all', subCat='', page=1;
const PER=50;

const SUB_MAP={
  'IT':['Software','Hardware','IT Services','Network & Telecom','Subscriptions & Renewal','Office & Surveillance'],
  'Marketing':['Agency & Branding','Media & Advertising','Production & Print','Research & Campaign','Events','Sponsorship & PR'],
  'Services':['Facility Management','HR & Training','General Services','Maintenance','Insurance','Emdad'],
  'Consultation & Engineering':['Construction','Consultation','Engineering','Real Estate','Furniture','Consumables'],
};

const COLORS={
  'Software':['#3b82f6','rgba(59,130,246,.13)'],
  'Hardware':['#f59e0b','rgba(245,158,11,.13)'],
  'IT Services':['#10b981','rgba(16,185,129,.13)'],
  'Network & Telecom':['#8b5cf6','rgba(139,92,246,.13)'],
  'Subscriptions & Renewal':['#06b6d4','rgba(6,182,212,.13)'],
  'Office & Surveillance':['#ef4444','rgba(239,68,68,.13)'],
  'Agency & Branding':['#8b5cf6','rgba(139,92,246,.13)'],
  'Media & Advertising':['#3b82f6','rgba(59,130,246,.13)'],
  'Production & Print':['#f59e0b','rgba(245,158,11,.13)'],
  'Research & Campaign':['#10b981','rgba(16,185,129,.13)'],
  'Events':['#f97316','rgba(249,115,22,.13)'],
  'Sponsorship & PR':['#ec4899','rgba(236,72,153,.13)'],
  'Facility Management':['#10b981','rgba(16,185,129,.13)'],
  'HR & Training':['#8b5cf6','rgba(139,92,246,.13)'],
  'General Services':['#64748b','rgba(100,116,139,.13)'],
  'Maintenance':['#f59e0b','rgba(245,158,11,.13)'],
  'Insurance':['#06b6d4','rgba(6,182,212,.13)'],
  'Emdad':['#f97316','rgba(249,115,22,.13)'],
  'Construction':['#f59e0b','rgba(245,158,11,.13)'],
  'Consultation':['#3b82f6','rgba(59,130,246,.13)'],
  'Engineering':['#10b981','rgba(16,185,129,.13)'],
  'Real Estate':['#8b5cf6','rgba(139,92,246,.13)'],
  'Furniture':['#ec4899','rgba(236,72,153,.13)'],
  'Consumables':['#94a3b8','rgba(148,163,184,.13)'],
};

const toast=(m,t='ok')=>{const el=document.getElementById('toast');el.textContent=m;el.className='toast'+(t==='err'?' err':'');el.style.display='block';setTimeout(()=>el.style.display='none',3000);};

// ── LOAD ──
async function loadAll(){
  let all=[],from=0,chunk=1000;
  while(true){
    const{data,error}=await sb.from('vendors').select('id,vendor_number,name,category,subcategory,specialty,email,phone').range(from,from+chunk-1);
    if(error||!data||!data.length)break;
    all=[...all,...data];
    if(data.length<chunk)break;
    from+=chunk;
  }
  ALL=all;
  document.getElementById('totalCount').textContent=ALL.length.toLocaleString()+' vendors';
  document.getElementById('cnt-all').textContent=ALL.length.toLocaleString();
  document.getElementById('cnt-it').textContent=ALL.filter(v=>v.category==='IT').length;
  document.getElementById('cnt-mkt').textContent=ALL.filter(v=>v.category==='Marketing').length;
  document.getElementById('cnt-svc').textContent=ALL.filter(v=>v.category==='Services').length;
  document.getElementById('cnt-con').textContent=ALL.filter(v=>v.category==='Consultation & Engineering').length;
  applyFilters();
}

// ── FILTERS ──
function setMainCat(cat,btn){
  mainCat=cat;subCat='';page=1;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderSubTabs();updateSubSelect();applyFilters();
}
function renderSubTabs(){
  const subs=mainCat==='all'?[]:SUB_MAP[mainCat]||[];
  document.getElementById('subRow').innerHTML=subs.map(s=>
    `<button class="sub-btn${subCat===s?' active':''}" onclick="setSubCat('${s}',this)">${s}</button>`
  ).join('');
}
function setSubCat(cat,btn){
  subCat=subCat===cat?'':cat;page=1;
  document.querySelectorAll('.sub-btn').forEach(b=>b.classList.remove('active'));
  if(subCat)btn.classList.add('active');
  document.getElementById('vSubCat').value=subCat;
  applyFilters();
}
function updateSubSelect(){
  const subs=mainCat==='all'?Object.values(SUB_MAP).flat():(SUB_MAP[mainCat]||[]);
  document.getElementById('vSubCat').innerHTML='<option value="">All Sub-categories</option>'+subs.map(s=>`<option value="${s}">${s}</option>`).join('');
}
function onFilter(){subCat=document.getElementById('vSubCat').value;page=1;document.querySelectorAll('.sub-btn').forEach(b=>b.classList.toggle('active',b.textContent===subCat));applyFilters();}
function onSearch(){page=1;applyFilters();}
function applyFilters(){
  const q=document.getElementById('vSrch').value.toLowerCase().trim();
  let d=ALL;
  if(mainCat!=='all')d=d.filter(v=>v.category===mainCat);
  if(subCat)d=d.filter(v=>v.subcategory===subCat);
  if(q)d=d.filter(v=>(v.name||'').toLowerCase().includes(q)||(v.email||'').toLowerCase().includes(q)||(v.vendor_number||'').includes(q)||(v.specialty||'').toLowerCase().includes(q));
  filtered=d;render();
}

// ── RENDER ──
function render(){
  const total=filtered.length,pages=Math.max(1,Math.ceil(total/PER));
  if(page>pages)page=1;
  const slice=filtered.slice((page-1)*PER,page*PER);
  document.getElementById('vCt').textContent=total.toLocaleString()+' results';
  const b=document.getElementById('vBody');
  if(!slice.length){
    b.innerHTML='<tr><td colspan="6"><div class="empty"><div class="empty-i">🔍</div><div>No vendors found</div></div></td></tr>';
    document.getElementById('vPager').innerHTML='';return;
  }
  b.innerHTML=slice.map(v=>{
    const cl=COLORS[v.subcategory]||['#64748b','rgba(100,116,139,.13)'];
    return `<tr>
      <td><span class="vno">${v.vendor_number||'—'}</span></td>
      <td><div class="vnm">${v.name||'—'}</div></td>
      <td><span class="badge" style="background:${cl[1]};color:${cl[0]}">${v.subcategory||'—'}</span></td>
      <td><span class="spec">${v.specialty||'—'}</span></td>
      <td>${v.email?`<a href="mailto:${v.email}" class="eml">${v.email}</a>`:'—'}</td>
      <td><span class="phn">${v.phone||'—'}</span></td>
    </tr>`;
  }).join('');
  const pg=document.getElementById('vPager');
  if(pages<=1){pg.innerHTML='';return;}
  pg.innerHTML=`<button class="pgbtn" onclick="goPage(-1)" ${page===1?'disabled':''}>← Prev</button><span class="pgi">Page ${page} of ${pages}</span><button class="pgbtn" onclick="goPage(1)" ${page===pages?'disabled':''}>Next →</button>`;
}
function goPage(d){page+=d;render();window.scrollTo({top:200,behavior:'smooth'});}

// ── ADD VENDOR ──
function openAddVendor(){
  ['nv-name','nv-no','nv-spec','nv-email','nv-phone'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('nv-cat').value='';
  document.getElementById('nv-sub').innerHTML='<option value="">— Select category first —</option>';
  document.getElementById('nv-type').value='Local';
  document.getElementById('addMo').classList.add('open');
}
function closeAddVendor(){document.getElementById('addMo').classList.remove('open');}
function updateAddSubCat(){
  const cat=document.getElementById('nv-cat').value;
  const subs=SUB_MAP[cat]||[];
  document.getElementById('nv-sub').innerHTML='<option value="">— Select —</option>'+subs.map(s=>`<option value="${s}">${s}</option>`).join('');
}
async function saveVendor(){
  const name=document.getElementById('nv-name').value.trim();
  const cat=document.getElementById('nv-cat').value;
  if(!name||!cat){toast('Name and category are required','err');return;}
  const obj={
    vendor_number:document.getElementById('nv-no').value.trim()||null,
    name,
    category:cat,
    subcategory:document.getElementById('nv-sub').value||null,
    specialty:document.getElementById('nv-spec').value.trim()||null,
    email:document.getElementById('nv-email').value.trim()||null,
    phone:document.getElementById('nv-phone').value.trim()||null,
    type:document.getElementById('nv-type').value,
  };
  const{error}=await sb.from('vendors').insert([obj]);
  if(error){toast('Error: '+error.message,'err');return;}
  closeAddVendor();toast('Vendor added ✓');
  await loadAll();
}

// ── KEYBOARD ──
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeAddVendor();});

// ── START ──
loadAll();
</script>
</body>
</html>
